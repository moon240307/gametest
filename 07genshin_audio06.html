<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素守護者 - 關卡 A</title>
    <style>
        body { margin: 0; background: #121417; overflow: hidden; font-family: "Courier New", Courier, monospace; color: white; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; pointer-events: none; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px rgba(255, 0, 0, 0); transition: 0.1s; z-index: 10; }
        
        .timer-ui { top: 20px; left: 50%; transform: translateX(-50%); font-size: 36px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; z-index: 30; }

        .top-left { top: 30px; left: 40px; z-index: 20; font-family: sans-serif; }
        .hp-grid-10 { display: flex; gap: 4px; margin-top: 5px; }
        .grid-10 { width: 18px; height: 12px; background: #00ffcc; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .grid-empty { background: #333 !important; }

        .team-container { bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 20; font-family: sans-serif; }
        .team-card { display: flex; flex-direction: column; align-items: center; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 85px; position: relative; overflow: hidden; }
        .team-card.active { border: 2px solid #ffd04b; transform: translateY(-10px); }
        .team-card.dead { filter: grayscale(1) opacity(0.4); }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; margin-bottom: 5px; background: #222; }
        .grid-3 { width: 15px; height: 8px; background: #79f222; transition: 0.3s; border: 1px solid rgba(0,0,0,0.5); }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; opacity: 0; transition: 0.2s; }
        .cd-active { opacity: 1; }

        /* 結局畫面 */
        .end-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; transition: opacity 1s; pointer-events: auto; background: rgba(0,0,0,0.9);
        }
        .end-screen h1 { font-size: 80px; margin: 0; letter-spacing: 10px; }
        #victory-screen h1 { color: #ffd04b; text-shadow: 0 0 30px gold; }
        #game-over h1 { color: #ff4d4d; text-shadow: 0 0 20px red; }

        /* 按鈕樣式 */
        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .game-btn { 
            padding: 12px 30px; font-size: 20px; font-family: sans-serif; font-weight: bold;
            color: white; background: rgba(255,255,255,0.1); border: 2px solid #fff; 
            border-radius: 50px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .game-btn:hover { background: white; color: black; transform: scale(1.1); }
        .btn-next { border-color: #ffd04b; color: #ffd04b; }
        .btn-next:hover { background: #ffd04b; color: black; }

        #burst-cutin { position: absolute; left: -60%; top: 0; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0.2), transparent); z-index: 50; display: flex; align-items: center; justify-content: center; transition: left 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s; opacity: 0; }
        #burst-cutin.active { left: 0; opacity: 1; }
        #burst-cutin.fadeout { left: -60%; opacity: 0; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="damage-overlay"></div>
    <div id="timer-display" class="overlay timer-ui">01:00</div>

    <!-- 結局畫面 (關卡 A) -->
    <div id="victory-screen" class="end-screen">
        <h1>VICTORY</h1>
        <p style="color: gold; font-size: 24px;">關卡 A 守護成功！</p>
        <div class="btn-container">
            <button class="game-btn" onclick="resetGame()">再玩一次</button>
            <button class="game-btn btn-next">下一關</button>
        </div>
    </div>

    <div id="game-over" class="end-screen">
        <h1>GAME OVER</h1>
        <p>防線崩潰...</p>
        <button class="game-btn" style="margin-top:20px" onclick="resetGame()">重新挑戰</button>
    </div>

    <div class="overlay top-left">
        <div style="font-size: 14px; color: #00ffcc; font-weight: bold;">PAIMON HP</div>
        <div id="guardian-hp-bar" class="hp-grid-10"></div>
    </div>
    <div id="burst-cutin"><canvas id="cutinCanvas"></canvas></div>
    <div class="overlay team-container">
        <div id="card-0" class="team-card active"><div id="cd-0" class="cd-overlay"></div><img class="avatar-img" src="game/w.jpg"><div style="display:flex;gap:2px;"><div class="grid-3"></div><div class="grid-3"></div><div class="grid-3"></div></div></div>
        <div id="card-1" class="team-card"><div id="cd-1" class="cd-overlay"></div><img class="avatar-img" src="game/f.jpg"><div style="display:flex;gap:2px;"><div class="grid-3"></div><div class="grid-3"></div><div class="grid-3"></div></div></div>
        <div id="card-2" class="team-card"><div id="cd-2" class="cd-overlay"></div><img class="avatar-img" src="game/e.jpg"><div style="display:flex;gap:2px;"><div class="grid-3"></div><div class="grid-3"></div><div class="grid-3"></div></div></div>
        <div id="card-3" class="team-card"><div id="cd-3" class="cd-overlay"></div><img class="avatar-img" src="game/g.jpg"><div style="display:flex;gap:2px;"><div class="grid-3"></div><div class="grid-3"></div><div class="grid-3"></div></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>

let isPaused = true; // 預設遊戲暫停，等待開始

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const cutinCanvas = document.getElementById('cutinCanvas');
    const cutinCtx = cutinCanvas.getContext('2d');
    const timerUI = document.getElementById('timer-display');
    const victoryUI = document.getElementById('victory-screen');
    const gameOverUI = document.getElementById('game-over');
    

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playShootSound(type) {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'laser') {
        // 1. 經典雷射聲 (頻率快速下滑)
        oscillator.type = 'sawtooth'; // 鋸齒波，聽起來較硬
        oscillator.frequency.setValueAtTime(880, now);
        oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        oscillator.start(now);
        oscillator.stop(now + 0.1);

    } else if (type === 'pop') {
        // 2. 清脆波一聲 (短促正弦波)
        oscillator.type = 'sine'; 
        oscillator.frequency.setValueAtTime(440, now);
        oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
        oscillator.start(now);
        oscillator.stop(now + 0.05);

    } else if (type === 'retro') {
        // 3. 復古 8-bit 擊發 (方波 + 頻率跳動)
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(600, now);
        oscillator.frequency.linearRampToValueAtTime(200, now + 0.15);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
        oscillator.start(now);
        oscillator.stop(now + 0.15);
    } else if (type === 'seed') {
    // 4. 草元素能量種子 (頻率快速上揚，聽起來輕盈靈動)
    oscillator.type = 'triangle'; // 三角波，聲音比鋸齒波柔和
    oscillator.frequency.setValueAtTime(300, now);
    oscillator.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
    gainNode.gain.setValueAtTime(0.15, now);
    gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
    oscillator.start(now);
    oscillator.stop(now + 0.1);
 }
}


// 定義音樂檔案路徑（請替換為你的檔案路徑）
const bgm = {
    levelA: new Audio('music/levelA.mp3'),
    levelB: new Audio('music/levelB.mp3'),
    boss: new Audio('music/boss.mp3'),
    victory: new Audio('music/victory.mp3') // 新增勝利音樂路徑
};

// 定義角色語音檔案路徑
const voices = [
    new Audio('music/w_voice.mp3'), // 哥倫比婭 (Q)
    new Audio('music/f_voice.mp3'), // 胡桃 (W)
    new Audio('music/e_voice.mp3'), // 娜維婭 (E)
    new Audio('music/g_voice.mp3')  // 納西妲 (R)
];

const bossVoices = {
    appear: new Audio('music/boss_appear.mp3'), // 出現時
    beam: new Audio('music/boss_beam.mp3')      // 準備發射雷射時
};

// 設定 Boss 語音音量
Object.values(bossVoices).forEach(v => v.volume = 0.9);


function playBossVoice(voice) {
    if (!voice || isGameEnded) return;
    
    const originalVol = 0.5;
    if (currentBgm) currentBgm.volume = originalVol * 0.5; // BGM 降音

    voice.currentTime = 0;
    voice.play().catch(e => console.log("Boss 語音播放受阻"));

    voice.onended = () => {
        if (!isGameEnded && currentBgm) currentBgm.volume = originalVol; // 恢復音量
    };
}



// 設定語音音量（通常語音會比 BGM 大聲一點點比較清楚）
voices.forEach(v => {
    v.volume = 0.8; 
});

// 基本設定：循環播放
Object.values(bgm).forEach(track => {
    track.loop = (track !== bgm.victory); // 勝利音樂通常播一遍或視需求循環
    track.volume = 0.5; // 音量 50%
});

let currentBgm = null;

// 進階播放控制：支援淡出
function fadeOutBgm(callback) {
    if (!currentBgm) {
        if (callback) callback();
        return;
    }

    currentBgm.volume = 0.5; // 確保從標準音量開始淡出
    const fadeDuration = 1000;
    const step = 0.05;
    const intervalTime = 50;

    const fadeInterval = setInterval(() => {
        if (currentBgm.volume > step) {
            currentBgm.volume -= step;
        } else {
            clearInterval(fadeInterval);
            currentBgm.pause();
            currentBgm.currentTime = 0;
            currentBgm.volume = 0.5; 
            if (callback) callback();
        }
    }, intervalTime);
}

// 進階播放控制：支援淡入
function fadeInBgm(track) {
    currentBgm = track;
    currentBgm.volume = 0; // 從 0 開始
    currentBgm.currentTime = 0;
    currentBgm.play().catch(e => console.log("播放受阻"));

    const fadeDuration = 2000; // 2 秒淡入
    const step = 0.05;
    const intervalTime = 100;

    const fadeInterval = setInterval(() => {
        if (currentBgm.volume < 0.5) {
            currentBgm.volume = Math.min(0.5, currentBgm.volume + step);
        } else {
            clearInterval(fadeInterval);
        }
    }, intervalTime);
}



// 統一的播放控制函式 (合併版本)
function playBgm(track) {
    // 如果要播放的就是正在播的，直接返回
    if (currentBgm === track && !currentBgm.paused) return;
    
    // 情況 A：如果是第一次播放音樂 (currentBgm 為 null)
    if (!currentBgm) {
        currentBgm = track;
        currentBgm.volume = 0.5;
        currentBgm.play().catch(e => console.log("播放受阻，等待互動"));
    } 
    // 情況 B：如果要換歌，先淡出舊的再播新的
    else {
        fadeOutBgm(() => {
            currentBgm = track;
            currentBgm.volume = 0.5;
            currentBgm.play().catch(e => console.log("播放受阻，等待互動"));
        });
    }
}

    function resize() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        cutinCanvas.width = window.innerWidth * 0.5; cutinCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let currentLevel = 'A', isGameEnded = false, isWarning = false;
    let startTime = 0, timeLeft = 60, guardianHp = 10, shakeIntensity = 0, currentIdx = 0;
    let spawnTimerA = 0, spawnTimerB = 0, spawnTimerC = 0, bossActive = false;
    let bullets = [], enemies = [], effects = [], enemyBullets = [], keys = {};
    let invincibleTimer = 0; 
    const player = { x: 350, y: canvas.height / 2, radius: 25, speed: 5, pulse: 0, active: true };

    const team = [
        { name: "哥倫比婭", color: "#3498db", hp: 3, type: 'W', burstKey: 'KeyQ', cd: 0, atkCd: 0 },
        { name: "胡桃", color: "#e74c3c", hp: 3, type: 'F', burstKey: 'KeyW', cd: 0, atkCd: 0 },
        { name: "娜維婭", color: "#f1c40f", hp: 3, type: 'E', burstKey: 'KeyE', cd: 0, atkCd: 0 },
        { name: "納西妲", color: "#2ecc71", hp: 3, type: 'G', burstKey: 'KeyR', cd: 0, atkCd: 0 }
    ];

    const nextBtn = document.querySelector('.btn-next');
    nextBtn.onclick = () => {
        currentLevel = (currentLevel === 'A') ? 'B' : 'A';
        resetGame();
    };

    function resetGame() {
        isGameEnded = false; bossActive = false; isWarning = false;
   
    isPaused = true; // 確保進入凍結畫面

        timeLeft = (currentLevel === 'B') ? 30 : 60;

    // 更新 UI 顯示初始時間（例如 01:00 或 00:30）
    timerUI.innerText = (currentLevel === 'B') ? "00:30" : "01:00";
    
    // ... 其他重置邏輯保持不變 ...

        document.querySelector('#victory-screen p').innerText = `關卡 ${currentLevel} 守護成功！`;
        nextBtn.innerText = (currentLevel === 'A') ? '下一關' : '回到關卡 A';

        guardianHp = 10; currentIdx = 0; invincibleTimer = 0;
        bullets = []; enemies = []; effects = []; enemyBullets = [];
        player.x = 350; player.y = canvas.height / 2; player.active = true;
        team.forEach(c => { c.hp = 3; c.cd = 0; c.atkCd = 0; });

        spawnTimerA = 0; spawnTimerB = 0; spawnTimerC = 0;
        victoryUI.style.display = 'none'; victoryUI.style.opacity = '0';
        gameOverUI.style.display = 'none'; gameOverUI.style.opacity = '0';
        updateUI();

    // ... 原有的程式碼 ...

    isPaused = true; // 每次重置都要進入等待畫面

    // 關卡切換時，playBgm 會自動執行淡出舊音樂並播放新音樂
    if (currentLevel === 'A') {
        playBgm(bgm.levelA);
    } else {
        playBgm(bgm.levelB);
    }

    // 根據關卡播放 BGM
    if (currentLevel === 'A') {
        playBgm(bgm.levelA);
    } else {
        playBgm(bgm.levelB);
    }

    // ... 原有的程式碼 ...
    }

    function checkPlayerDeath() {
        if (team[currentIdx].hp <= 0) {
            team[currentIdx].hp = 0;
            let survivor = team.findIndex(c => c.hp > 0);
            if (survivor !== -1) {
                currentIdx = survivor;
                invincibleTimer = 3000; 
                updateUI();
            } else {
                player.active = false;
                triggerEnd(false); // 觸發 GAME OVER
            }
        } else {
            invincibleTimer = 3000; 
        }
    }

    function drawPaimon(targetCtx, x, y, bounce) {
        targetCtx.save();
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
        targetCtx.beginPath(); targetCtx.arc(x, y + bounce, 15, 0, Math.PI * 2);
        targetCtx.fillRect(x - 12, y + bounce + 10, 24, 25);
        targetCtx.fill(); targetCtx.restore();
    }

    function drawSilhouette(targetCtx, x, y, type, color, bounce, scale=1) {
        targetCtx.save();
        targetCtx.translate(x, y); targetCtx.scale(scale, scale);
        if (invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
            targetCtx.fillStyle = "#ffffff";
        } else {
            targetCtx.fillStyle = color;
        }
        targetCtx.beginPath();
        if (type === 'W') { targetCtx.ellipse(0, bounce, 22, 28, 0, 0, Math.PI*2); targetCtx.rect(-20, bounce, 40, 35); }
        else if (type === 'F') { targetCtx.arc(0, bounce, 22, 0, Math.PI*2); targetCtx.fillRect(-30, bounce-10, 60, 10); }
        else if (type === 'E') { targetCtx.arc(0, bounce, 28, Math.PI, 0); targetCtx.ellipse(0, bounce + 10, 20, 25, 0, 0, Math.PI*2); }
        else { targetCtx.arc(0, bounce, 18, 0, Math.PI*2); targetCtx.arc(-18, bounce-5, 10, 0, Math.PI*2); }
        targetCtx.fill(); targetCtx.restore();
    }

    window.addEventListener('keydown', e => {

    // --- 新增：按下 X 啟動遊戲並播放音樂 ---
    if (isPaused && e.code === 'KeyX') {
        isPaused = false;


        startTime = Date.now(); // 重新設定開始時間，避免暫停時時間流逝

        // 同步更新敵人生成計時器，避免一開場就瞬間噴出一堆怪
        spawnTimerA = startTime; 
        spawnTimerB = startTime + 5000; 
        spawnTimerC = startTime + 3000;

        if (currentLevel === 'A') playBgm(bgm.levelA);
        else playBgm(bgm.levelB);

        // 如果你有使用 Web Audio API (發射子彈音效)，也順便啟動它
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        return;
    }
    // ------------------------------------

    if (isPaused || isGameEnded) return; // 暫停時不允許其他動作
    keys[e.code] = true;


    // 第一次按鍵時啟動音樂
    if (currentBgm && currentBgm.paused) {
        currentBgm.play();
    }
        if (isGameEnded) return;
        keys[e.code] = true;
        if (['Digit1', 'Digit2', 'Digit3', 'Digit4'].includes(e.code)) {
            let nextIdx = parseInt(e.code.slice(-1)) - 1;
            if (team[nextIdx] && team[nextIdx].hp > 0) { currentIdx = nextIdx; updateUI(); }
        }
        if (e.code === 'KeyX' && player.active) handleAttack();
        team.forEach((char, idx) => { if (e.code === char.burstKey) triggerBurst(idx); });
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function triggerBurst(idx) {
        const char = team[idx];
        if (char.cd > 0 || char.hp <= 0 || isGameEnded) return;

    // --- 新增：播放對應角色的語音 ---
    if (voices[idx]) {
        voices[idx].currentTime = 0; // 從頭播放
        voices[idx].play().catch(e => console.log("語音播放受阻:", e));
    }
    // ----------------------------

    // --- 1. 播放語音並觸發背景音樂降音 ---
    if (voices[idx] && currentBgm) {
        const originalVol = 0.5; // 你原本設定的 BGM 音量
        currentBgm.volume = originalVol * 0.5; // 降低 50% (變為 0.25)

        voices[idx].currentTime = 0;
        voices[idx].play().catch(e => console.log("播放受阻"));

        // 當這段語音「播放結束」時，恢復 BGM 音量
        voices[idx].onended = () => {
            if (!isGameEnded && currentBgm) {
                currentBgm.volume = originalVol; 
            }
        };
    }


        char.cd = 10;
        document.getElementById('burst-cutin').classList.add('active');
        cutinCtx.clearRect(0,0,cutinCanvas.width, cutinCanvas.height);
        drawSilhouette(cutinCtx, cutinCanvas.width/2, cutinCanvas.height/2, char.type, char.color, 0, 5);
        setTimeout(() => {
            if (char.type === 'W') guardianHp = Math.min(10, guardianHp + 3);
            if (char.type === 'F') bullets.push({ type: 'cherry', x: 0, y: canvas.height/2, vx: 3, r: 150, color: '#ff1493', power: 10 });
            if (char.type === 'E') {
                let c = 0; let inv = setInterval(() => {
                    if (isGameEnded) { clearInterval(inv); return; }
                    bullets.push({ type: 'rock', x: Math.random()*canvas.width, y: -50, vx: 0, vy: 15, r: 25, color: '#f1c40f', power: 1 });
                    if (++c > 45) clearInterval(inv);
                }, 60);
            }
            if (char.type === 'G') team.forEach(c => { if(c.hp > 0) c.hp = Math.min(3, c.hp + 3); });
            updateUI();
            document.getElementById('burst-cutin').classList.replace('active', 'fadeout');
            setTimeout(()=>document.getElementById('burst-cutin').classList.remove('fadeout'), 600);
        }, 1500);
    }

function triggerEnd(isVictory) {
    if (isGameEnded) return;
    isGameEnded = true;

    // 1. 先處理音樂
    if (currentBgm) {
        // 先淡出舊的，淡出完後再播放勝利音樂
        fadeOutBgm(() => {
            if (isVictory && bgm.victory) {
                currentBgm = bgm.victory;
                currentBgm.volume = 0.5; // 也可以改用 fadeInBgm(bgm.victory)
                currentBgm.play().catch(e => console.log("勝利音樂播放受阻"));
            }
        });
    } else if (isVictory) {
        // 如果原本沒音樂在播，直接播勝利音樂
        currentBgm = bgm.victory;
        currentBgm.volume = 0.5;
        currentBgm.play();
    }

    // 2. 顯示 UI
    const ui = isVictory ? victoryUI : gameOverUI;
    ui.style.display = 'flex';
    setTimeout(() => { ui.style.opacity = '1'; }, 10);
}

    function handleAttack() {
        const char = team[currentIdx];
        if (char.atkCd > 0 || isGameEnded) return;

    // 啟動 AudioContext (瀏覽器安全要求：必須在使用者互動後啟動)
    if (audioCtx.state === 'suspended') audioCtx.resume();

        if (char.type === 'W') {
        playShootSound('retro'); // 哥倫比婭的波動聲
            effects.push({ type: 'wave', x: player.x, y: player.y, r: 0, maxR: 300 });
            enemies.forEach(en => { if (Math.hypot(player.x - en.x, player.y - en.y) < 300) { en.hp--; en.hitFlash = 5; } });
            char.atkCd = 0.3;
        } else if (char.type === 'F') {
        playShootSound('pop'); // 胡桃的櫻花彈清脆聲
            bullets.push({ type: 'cherry', x: player.x, y: player.y, vx: 6, r: 75, color: '#ff69b4' });
            char.atkCd = 2.0; 
        } else if (char.type === 'E') {
        playShootSound('laser'); // 娜維婭的岩石射擊聲
            [0, -0.4, 0.4].forEach(vy => bullets.push({ type: 'rock', x: player.x, y: player.y, vx: 18, vy: vy*10, r: 15, color: '#f1c40f' }));
            char.atkCd = 0.3;
        } else if (char.type === 'G') {
    // 遍歷敵人，若在玩家右側則鎖定
    enemies.forEach(en => { 
        if (en.x > player.x) { 
            en.locked = true; 
            setTimeout(() => { 
                if (enemies.includes(en)) {
                    // --- 在這裡加入種子射出的音效 ---
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    playShootSound('seed'); 
                    // ----------------------------
                    bullets.push({ type: 'seed', x: player.x, y: player.y, target: en, color: '#2ecc71' }); 
                }
                en.locked = false; 
            }, 800); 
        } 
    });
        }
    }

    function spawnBoss() {
        bossActive = true;
    playBgm(bgm.boss); // 切換到 Boss 戰音樂

    // --- 新增：Boss 出現語音 ---
    playBossVoice(bossVoices.appear);
    

    // ... 原有的敵人推入邏輯 ...
        enemies.push({
            x: canvas.width + 200, y: canvas.height/2, hp: 500, maxHp: 500, type: 'D', size: 150,
            targetX: canvas.width * 0.8, targetY: canvas.height / 2,
            nextMoveTime: Date.now() + 3000, atk1Timer: 0, atk2Timer: Date.now() + 5000,
            beamTriggered: { 400: false, 300: false, 200: false, 100: false }, 
            beamActive: 0, beamWarning: 0, beamCharge: 0
        });
    }

    function updateUI() {
        team.forEach((char, i) => {
            const card = document.getElementById(`card-${i}`);
            const cdBox = document.getElementById(`cd-${i}`);
            if(!card || !cdBox) return;
            card.className = `team-card ${i === currentIdx ? 'active' : ''} ${char.hp <= 0 ? 'dead' : ''}`;
            if (char.cd > 0) { cdBox.classList.add('cd-active'); cdBox.innerText = Math.ceil(char.cd); }
            else { cdBox.classList.remove('cd-active'); cdBox.innerText = ""; }
            card.querySelectorAll('.grid-3').forEach((g, gi) => g.style.background = gi < char.hp ? '#79f222' : '#333');
        });
        const hpBar = document.getElementById('guardian-hp-bar');
        if(hpBar) {
            hpBar.innerHTML = '<div class="grid-10"></div>'.repeat(10);
            hpBar.querySelectorAll('.grid-10').forEach((g, i) => g.classList.toggle('grid-empty', i >= guardianHp));
        }
        if (guardianHp <= 0) triggerEnd(false);
    }

    setInterval(() => { 
        if (isGameEnded || isPaused) return; // 如果暫停中，就不更新時間與 CD
        let elapsed = (Date.now() - startTime) / 1000;
        let limit = (currentLevel === 'B' ? 30 : 60);
        let curTime = Math.max(0, limit - elapsed);
        if (curTime > 0) {
            timerUI.innerText = `${String(Math.floor(curTime/60)).padStart(2,'0')}:${String(Math.floor(curTime%60)).padStart(2,'0')}`;
        } else {
            timerUI.innerText = "00:00";
            if (currentLevel === 'A') triggerEnd(true);
            else if (!bossActive && !isWarning && enemies.length === 0) {
                isWarning = true;
                setTimeout(() => { isWarning = false; spawnBoss(); }, 4000);
            }
        }
        team.forEach(char => { 
            if (char.cd > 0) char.cd = Math.max(0, char.cd - 0.1); 
            if (char.atkCd > 0) char.atkCd = Math.max(0, char.atkCd - 0.1);
        }); 
        if (invincibleTimer > 0) invincibleTimer -= 100;
        updateUI(); 
    }, 100);

    function updateLogic() {
        if (isGameEnded) return;
        let now = Date.now();

        if (!bossActive && !isWarning && (currentLevel === 'A' || (currentLevel === 'B' && (now - startTime)/1000 < 30))) {
            if (now - spawnTimerA > 3000) { enemies.push({ x: canvas.width + 50, y: Math.random()*(canvas.height-350)+100, hp: 3, maxHp: 3, speed: 3, type: 'A' }); spawnTimerA = now; }
            if (now > startTime + 5000 && now - spawnTimerB > 10000) { enemies.push({ x: canvas.width + 50, y: Math.random()*(canvas.height-350)+100, hp: 10, maxHp: 10, speed: 1, type: 'B', size: 70 }); spawnTimerB = now; }
            if (now > startTime + 3000 && now - spawnTimerC > 5000) { enemies.push({ x: canvas.width + 50, y: Math.random()*(canvas.height-350)+100, hp: 2, maxHp: 2, speed: 2, type: 'C', atkCd: 2000, lastAtk: now }); spawnTimerC = now; }
        }

        let dx = 0, dy = 0;
        if (keys['ArrowUp']) dy -= 1; if (keys['ArrowDown']) dy += 1;
        if (keys['ArrowLeft']) dx -= 1; if (keys['ArrowRight']) dx += 1;
        if (dx || dy) {
            const len = Math.sqrt(dx*dx + dy*dy);
            player.x = Math.max(200, Math.min(canvas.width - 50, player.x + (dx/len)*5));
            player.y = Math.max(50, Math.min(canvas.height - 200, player.y + (dy/len)*5));
        }

        bullets.forEach((b, bi) => {
            if (b.type === 'seed' && b.target) {
                let dx_ = b.target.x - b.x, dy_ = b.target.y - b.y, dist = Math.hypot(dx_, dy_);
                b.x += dx_/dist*15; b.y += dy_/dist*15;
                if (dist < 20) { b.target.hp--; b.target.hitFlash=5; bullets.splice(bi,1); }
            } else { b.x += b.vx || 0; b.y += b.vy || 0; }
            enemies.forEach(en => {
                let rad = en.size ? en.size/2 : 25;
                if (Math.hypot(b.x - en.x, b.y - en.y) < ((b.r || 8) + rad)) {
                    en.hp -= (b.power || 1); en.hitFlash = 5; if (b.type !== 'cherry') bullets.splice(bi, 1);
                }
            });
        });

        enemyBullets.forEach((eb, ebi) => {
            eb.x += eb.vx || -8; eb.y += eb.vy || 0;
            if (invincibleTimer <= 0 && Math.hypot(player.x - eb.x, player.y - eb.y) < 30) {
                team[currentIdx].hp--; enemyBullets.splice(ebi, 1); 
                checkPlayerDeath(); updateUI();
            } else if (eb.x < -100 || eb.x > canvas.width + 200) enemyBullets.splice(ebi, 1);
        });

        enemies.forEach((en, i) => {
            if (en.type === 'D') {
                en.x += (en.targetX - en.x) * 0.05; en.y += (en.targetY - en.y) * 0.05;
                if (now > en.nextMoveTime && !en.beamActive && !en.beamWarning && !en.beamCharge) {
                    en.targetX = canvas.width * (0.65 + Math.random() * 0.25);
                    en.targetY = 100 + Math.random() * (canvas.height - 300);
                    en.nextMoveTime = now + 3000 + Math.random() * 2000;
                }
                if (now - en.atk1Timer > 2000 && !en.beamActive) {
                    let angle = Math.atan2(player.y - en.y, player.x - en.x);
                    enemyBullets.push({ x: en.x, y: en.y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4 });
                    en.atk1Timer = now;
                }
                if (now > en.atk2Timer && !en.beamActive) {
                    for(let a=0; a<360; a+=10) {
                        let rad = a * Math.PI / 180;
                        enemyBullets.push({ x: en.x, y: en.y, vx: Math.cos(rad)*6, vy: Math.sin(rad)*6 });
                    }
                    en.atk2Timer = now + 5000;
                }
                for(let k in en.beamTriggered) {
                    if (en.hp <= parseInt(k) && !en.beamTriggered[k]) {
                        en.beamTriggered[k] = true; en.beamWarning = now + 1000;
        // --- 新增：發動必殺技語音 ---
        playBossVoice(bossVoices.beam);
                    }
                }
                if (en.beamWarning && now > en.beamWarning) { en.beamCharge = now + 2000; en.beamWarning = 0; }
                if (en.beamCharge && now > en.beamCharge) { en.beamActive = now + 3000; en.beamCharge = 0; }
                if (en.beamActive) {
                    if (now > en.beamActive) en.beamActive = 0;
                    else if (invincibleTimer <= 0 && player.y > en.y - 120 && player.y < en.y + 120) {
                        team[currentIdx].hp = 0; checkPlayerDeath(); updateUI();
                    }
                }
                if (invincibleTimer <= 0 && Math.hypot(player.x - en.x, player.y - en.y) < 100) {
                    team[currentIdx].hp--; checkPlayerDeath(); updateUI();
                }
                if (en.hp <= 0) { enemies.splice(i,1); triggerEnd(true); }
            } else {
                en.x -= en.speed;
                if (en.type === 'C' && now - (en.lastAtk || 0) > (en.atkCd || 2000)) {
                    enemyBullets.push({ x: en.x, y: en.y, vx: -8, vy: 0 });
                    en.lastAtk = now;
                }
                if (invincibleTimer <= 0 && Math.hypot(player.x - en.x, player.y - en.y) < 45) {
                    team[currentIdx].hp--; checkPlayerDeath(); updateUI();
                }
                if (en.x < 150) { guardianHp--; enemies.splice(i, 1); updateUI(); }
                else if (en.hp <= 0) enemies.splice(i, 1);
            }
        });
        effects.forEach((ef, i) => { ef.r += 12; if (ef.r > 225) effects.splice(i, 1); });
    }

    function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- 新增：暫停/準備畫面邏輯 ---
    if (isPaused) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; // 背景變暗
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#00ffcc";
        ctx.font = "bold 50px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(`LEVEL ${currentLevel} READY`, canvas.width / 2, canvas.height / 2 - 40);
        
        ctx.fillStyle = "white";
        ctx.font = "24px sans-serif";
        ctx.fillText("請按 [ X ] 鍵開始守護", canvas.width / 2, canvas.height / 2 + 40);
        
        requestAnimationFrame(draw);
        return; // 跳過後面的邏輯更新與繪製
    }
    // ----------------------------

        ctx.save();
        if (shakeIntensity > 1) { shakeIntensity *= 0.85; ctx.translate(Math.random()*shakeIntensity, Math.random()*shakeIntensity); }
        
        ctx.strokeStyle = "rgba(0, 255, 204, 0.2)"; ctx.beginPath(); ctx.moveTo(150, 0); ctx.lineTo(150, canvas.height); ctx.stroke();
        drawPaimon(ctx, 80, canvas.height/2, Math.sin(Date.now()/400)*10);

        if (isWarning) {
            ctx.fillStyle = `rgba(255, 0, 0, ${0.4 + Math.abs(Math.sin(Date.now()/400)) * 0.6})`;
            ctx.font = "bold 80px Courier New"; ctx.textAlign = "center";
            ctx.fillText("DANGEROUS", canvas.width/2, canvas.height/2);
        }

        enemies.forEach(en => {
            ctx.save();
            if (en.locked) { ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 4; ctx.strokeRect(en.x - (en.size||50)/2 - 5, en.y - (en.size||50)/2 - 5, (en.size||50) + 10, (en.size||50) + 10); }
            if (en.type === 'D') {
                if (en.beamWarning && Math.floor(Date.now() / 166) % 2 === 0) { ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(en.x-80, en.y, 30, 0, Math.PI*2); ctx.fill(); }
                if (en.beamCharge) { let ratio = Math.min(1, (2000 - (en.beamCharge - Date.now())) / 2000); ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + ratio*0.6})`; ctx.beginPath(); ctx.arc(en.x-80, en.y, 30 + ratio*50, 0, Math.PI*2); ctx.fill(); }
                if (en.beamActive) { let grad = ctx.createLinearGradient(en.x, 0, 0, 0); grad.addColorStop(0, "rgba(255, 0, 0, 0.9)"); grad.addColorStop(1, "rgba(255, 255, 255, 0)"); ctx.fillStyle = grad; ctx.fillRect(0, en.y - 120, en.x, 240); }
                ctx.fillStyle = en.hitFlash > 0 ? "#fff" : "#6c5ce7"; ctx.beginPath(); ctx.roundRect(en.x-en.size/2, en.y-en.size/2, en.size, en.size, 15); ctx.fill();
            } else {
                ctx.fillStyle = en.hitFlash > 0 ? "#fff" : (en.type === 'B' ? "#2c3e50" : (en.type === 'C' ? "#6c5ce7" : "#444")); ctx.beginPath(); ctx.roundRect(en.x-25, en.y-25, 50, 50, 5); ctx.fill();
            }
            let s = en.size || 50; for(let i=0; i < en.maxHp; i++) { ctx.fillStyle = i < en.hp ? (en.type === 'D' ? "#ff0000" : "#ff4d4d") : "#222"; ctx.fillRect(en.x - s/2 + 5 + (i * ((s - 10) / en.maxHp)), en.y - s/2 - 20, ((s - 10) / en.maxHp) - 1, 8); }
            ctx.restore();
        });

        enemyBullets.forEach(eb => { ctx.fillStyle = "#ff4d4d"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill(); });
        bullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r || 8, 0, Math.PI*2); ctx.fill(); });
        effects.forEach(ef => { ctx.strokeStyle = "#3498db"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI*2); ctx.stroke(); });
        
        if (!isGameEnded && player.active && team[currentIdx]) {
            drawSilhouette(ctx, player.x, player.y, team[currentIdx].type, team[currentIdx].color, Math.sin(Date.now()/50)*5);
        }
        ctx.restore();
        updateLogic();
        requestAnimationFrame(draw);
    }
    resetGame(); draw();

</script>
</body>
</html>
