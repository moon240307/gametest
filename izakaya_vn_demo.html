
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #game {
    width: 390px;
    height: 844px;
    background: #1a0a00;
    position: relative;
    overflow: hidden;
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    flex-direction: column;
    margin: 0 auto;
  }
  #scene {
    width: 100%;
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #bg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }
  #character {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 210px;
    opacity: 0;
    transition: opacity 0.8s, transform 0.8s;
    transform-origin: bottom center;
  }
  #character.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #character.hidden-right {
    opacity: 0;
    transform: translateX(calc(-50% + 120px));
  }
  #character.enter-right {
    transform: translateX(calc(-50% + 80px));
    opacity: 0;
  }

  #namebox {
    position: absolute;
    top: 10px;
    left: 14px;
    background: rgba(120,60,10,0.92);
    border: 1px solid #e8a84a;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 14px;
    font-weight: 700;
    color: #fde9b0;
    display: none;
    letter-spacing: 1px;
  }

  #dialog-area {
    width: 100%;
    background: rgba(18,8,0,0.93);
    border-top: 1.5px solid #8b4e0a;
    padding: 0;
    min-height: 170px;
    position: relative;
    flex-shrink: 0;
  }
  #dialog-box {
    padding: 14px 18px 10px;
    min-height: 100px;
    position: relative;
  }
  #dialog-text {
    font-size: 15px;
    color: #f5e6c8;
    line-height: 1.7;
    min-height: 70px;
    letter-spacing: 0.3px;
  }
  #tap-hint {
    position: absolute;
    bottom: 6px;
    right: 14px;
    font-size: 11px;
    color: #c8902a;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #choices {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 10px 16px 14px;
  }
  .choice-btn {
    background: rgba(120,60,10,0.5);
    border: 1px solid #c8802a;
    border-radius: 8px;
    color: #fde9b0;
    font-size: 14px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s;
    font-family: inherit;
  }
  .choice-btn:active { background: rgba(180,90,10,0.7); }

  #cocktail-ui {
    display: none;
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,4,0,0.97);
    border-top: 1.5px solid #8b4e0a;
    padding: 16px;
    z-index: 20;
    flex-direction: column;
    gap: 10px;
  }
  #cocktail-ui.show { display: flex; }
  #cocktail-title {
    font-size: 14px;
    color: #e8a84a;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .ingredient-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ing-btn {
    background: rgba(80,35,5,0.7);
    border: 1px solid #a06020;
    border-radius: 20px;
    color: #f0d080;
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, border-color 0.2s;
  }
  .ing-btn.selected {
    background: rgba(180,100,20,0.8);
    border-color: #e8a84a;
    color: #fff8e0;
  }
  #shake-btn {
    background: linear-gradient(135deg, #8b3a00, #c06010);
    border: none;
    border-radius: 10px;
    color: #fff8e0;
    font-size: 15px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    display: none;
  }
  #cocktail-result {
    display: none;
    text-align: center;
    font-size: 14px;
    color: #fde9b0;
    padding: 6px 0;
  }
  #close-cocktail {
    display: none;
    background: rgba(60,20,0,0.8);
    border: 1px solid #6b3a0a;
    border-radius: 8px;
    color: #c8a060;
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    font-family: inherit;
  }

  #recall-btn {
    display: none;
    position: absolute;
    top: 12px;
    right: 14px;
    background: rgba(120,60,10,0.85);
    border: 1px solid #e8a84a;
    border-radius: 20px;
    color: #fde9b0;
    font-size: 13px;
    padding: 7px 16px;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
  }

  #mixing-btn {
    display: none;
    position: absolute;
    bottom: 12px;
    right: 14px;
    background: rgba(120,60,10,0.85);
    border: 1px solid #e8a84a;
    border-radius: 20px;
    color: #fde9b0;
    font-size: 13px;
    padding: 7px 16px;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
  }

  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  #title-text {
    font-size: 13px;
    color: rgba(232,168,74,0.7);
    letter-spacing: 2px;
  }

  .heart {
    position: absolute;
    font-size: 18px;
    animation: floatUp 1.5s ease-out forwards;
    pointer-events: none;
    z-index: 30;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  #affection-bar {
    position: absolute;
    top: 50px;
    right: 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    z-index: 5;
  }
  #aff-label { font-size: 10px; color: rgba(232,168,74,0.6); letter-spacing: 1px; }
  #aff-track {
    width: 70px;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  #aff-fill {
    height: 100%;
    background: linear-gradient(90deg, #c06020, #e8a84a);
    border-radius: 3px;
    width: 0%;
    transition: width 0.5s;
  }
</style>

const script4 = [
  { speaker: '凜', text: '（再次品嚐）……', action: 'addAff20' },
  { speaker: '凜', text: '你每次調的都不一樣，但都剛好是我想要的。' },
  { speaker: '你（酒保）', text: '因為我在看著你啊。' },
  { speaker: '凜', text: '……（沉默片刻）', action: 'addAff15' },
  { speaker: '凜', text: '……我不太習慣有人這樣說。' },
  { speaker: '你（酒保）', text: '習慣就好。' },
  { speaker: '凜', text: '（低笑）你真的……很麻煩。' },
  { speaker: '凜', text: '但是……謝謝你。', action: 'addAff10' },
  { speaker: '', text: '他再次起身，這次步伐放慢了許多。' },
  { speaker: '凜', text: '……下次，我帶甜點來。', action: 'leaveGuest2' },
];

let currentScript = script1;

function typeText(text, cb) {
  typing = true;
  tapHint.style.display = 'none';
  dialogText.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    dialogText.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typeTimer);
      typing = false;
      tapHint.style.display = 'block';
      if (cb) cb();
    }
  }, 28);
}

function showLine(line) {
  choicesEl.style.display = 'none';
  if (line.speaker && line.speaker !== '你（酒保）') {
    namebox.style.display = 'block';
    namebox.textContent = line.speaker === '' ? '' : line.speaker;
  } else if (line.speaker === '你（酒保）') {
    namebox.style.display = 'block';
    namebox.textContent = '你';
    namebox.style.background = 'rgba(30,60,100,0.92)';
  } else {
    namebox.style.display = 'none';
    namebox.style.background = 'rgba(120,60,10,0.92)';
  }
  if (line.speaker !== '你（酒保）') namebox.style.background = 'rgba(120,60,10,0.92)';

  typeText(line.text, () => {
    if (line.action) handleAction(line.action);
  });
}

function handleAction(action) {
  if (action === 'showMixing') {
    mixingBtn.style.display = 'block';
  } else if (action === 'addAff15') {
    setAff(affection + 15); spawnHearts();
  } else if (action === 'addAff10') {
    setAff(affection + 10); spawnHearts();
  } else if (action === 'addAff20') {
    setAff(affection + 20); spawnHearts();
  } else if (action === 'leaveGuest') {
    setTimeout(() => {
      char.classList.remove('visible');
      char.classList.add('hidden-right');
      mixingBtn.style.display = 'none';
      setTimeout(() => {
        dialogText.textContent = '他走出了居酒屋的門。\n靜靜的夜，只剩下你和燈光。';
        namebox.style.display = 'none';
        tapHint.style.display = 'none';
        recallBtn.style.display = 'block';
        currentScript = null;
      }, 900);
    }, 600);
  } else if (action === 'leaveGuest2') {
    setTimeout(() => {
      char.classList.remove('visible');
      char.classList.add('hidden-right');
      setTimeout(() => {
        dialogText.textContent = '凜的身影消失在夜色中。\n那句「下次帶甜點來」，讓今晚變得特別。\n\n— DEMO 結束 —\n感謝體驗！';
        namebox.style.display = 'none';
        tapHint.style.display = 'none';
        recallBtn.style.display = 'none';
      }, 900);
    }, 600);
  }
}

function advance() {
  if (typing) {
    clearInterval(typeTimer);
    typing = false;
    tapHint.style.display = 'block';
    dialogText.textContent = currentScript ? currentScript[lineIdx - 1]?.text || '' : dialogText.textContent;
    if (currentScript && currentScript[lineIdx - 1]?.action) {
      handleAction(currentScript[lineIdx - 1].action);
    }
    return;
  }
  if (!currentScript) return;
  if (lineIdx >= currentScript.length) return;
  const line = currentScript[lineIdx];
  lineIdx++;
  showLine(line);
}

document.getElementById('dialog-area').addEventListener('click', (e) => {
  if (e.target.closest('#choices') || e.target.closest('#cocktail-ui')) return;
  advance();
});
document.getElementById('scene').addEventListener('click', (e) => {
  if (e.target.closest('#recall-btn') || e.target.closest('#mixing-btn') || e.target.closest('#cocktail-ui')) return;
  advance();
});

function startGame() {
  currentScript = script1;
  lineIdx = 0;
  setTimeout(() => {
    char.classList.remove('hidden-right', 'enter-right', 'visible');
    char.style.transform = 'translateX(calc(-50% + 80px))';
    char.style.opacity = '0';
    char.offsetHeight;
    requestAnimationFrame(() => {
      char.style.transition = 'opacity 0.9s, transform 0.9s';
      char.style.transform = 'translateX(-50%)';
      char.style.opacity = '1';
    });
    setTimeout(() => {
      advance();
    }, 1000);
  }, 1200);
  showLine({ speaker: '', text: '深夜の居酒屋。燈光昏黃，酒香飄散……' });
}

function recallGuest() {
  recallBtn.style.display = 'none';
  dialogText.textContent = '你走到門口，輕聲叫住了那道身影。';
  namebox.style.display = 'none';
  tapHint.style.display = 'none';
  isPhase4 = true;
  setTimeout(() => {
    char.style.transition = 'opacity 0.9s, transform 0.9s';
    char.style.transform = 'translateX(calc(-50% + 80px))';
    char.style.opacity = '0';
    char.offsetHeight;
    requestAnimationFrame(() => {
      char.style.transform = 'translateX(-50%)';
      char.style.opacity = '1';
    });
    setTimeout(() => {
      currentScript = script3;
      lineIdx = 0;
      cocktailMade = false;
      advance();
    }, 950);
  }, 800);
}

function openCocktail() {
  const ui = document.getElementById('cocktail-ui');
  ui.classList.add('show');
  selectedBase = null; selectedFlavor = null;
  document.getElementById('shake-btn').style.display = 'none';
  document.getElementById('cocktail-result').style.display = 'none';
  document.getElementById('close-cocktail').style.display = 'none';

  const baseRow = document.getElementById('base-row');
  const flavorRow = document.getElementById('flavor-row');
  baseRow.innerHTML = '';
  flavorRow.innerHTML = '';

  bases.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'ing-btn';
    btn.textContent = b;
    btn.onclick = () => {
      document.querySelectorAll('#base-row .ing-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBase = b;
      checkShake();
    };
    baseRow.appendChild(btn);
  });
  flavors.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'ing-btn';
    btn.textContent = f;
    btn.onclick = () => {
      document.querySelectorAll('#flavor-row .ing-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedFlavor = f;
      checkShake();
    };
    flavorRow.appendChild(btn);
  });
}

function checkShake() {
  if (selectedBase && selectedFlavor) {
    document.getElementById('shake-btn').style.display = 'block';
  }
}

function shakeCocktail() {
  const key = selectedBase + selectedFlavor;
  const name = cocktailNames[key] || (selectedBase + '×' + selectedFlavor + '特調');
  document.getElementById('cocktail-result').style.display = 'block';
  document.getElementById('cocktail-result').textContent = '✨ 完成：「' + name + '」';
  document.getElementById('shake-btn').style.display = 'none';
  document.getElementById('close-cocktail').style.display = 'block';
  cocktailMade = true;
}

function closeCocktail() {
  document.getElementById('cocktail-ui').classList.remove('show');
  mixingBtn.style.display = 'none';
  currentScript = isPhase4 ? script4 : script2;
  lineIdx = 0;
  advance();
}

function spawnHearts() {
  const scene = document.getElementById('scene');
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = ['♥','♡','💕'][i % 3];
    h.style.left = (80 + Math.random() * 180) + 'px';
    h.style.top = (200 + Math.random() * 80) + 'px';
    h.style.animationDelay = (i * 0.2) + 's';
    scene.appendChild(h);
    setTimeout(() => h.remove(), 1800);
  }
}

startGame();
</script>
